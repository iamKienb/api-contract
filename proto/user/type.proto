syntax = "proto3";

package user.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/iamKienb/api-contract/gen/user";

message UserProfileInfo {
  string full_name = 3 [(validate.rules).string.min_len = 1];
  string gender    = 4 [(validate.rules).string = {in: ["Male", "Female", "Other"]}];
}

message RegisterUserRequest {
  string          email    = 1 [(validate.rules).string.email = true];
  string          password = 2 [(validate.rules).string.min_len = 8];
  UserProfileInfo profile  = 3 [(validate.rules).message.required = true];
}

message RegisterUserResponse {
  string                    session_token = 1;
  google.protobuf.Timestamp expires_at    = 2;
}

message LoginUserRequest {
  string email    = 1 [(validate.rules).string.email = true];
  string password = 2 [(validate.rules).string.min_len = 8];
}

message LoginUserResponse {
  string                    access_token       = 1;
  string                    refresh_token      = 2;
  google.protobuf.Timestamp access_expires_at  = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message LocationInfo {
  int64  id   = 1 [(validate.rules).int64.gt = 0];
  string name = 2 [(validate.rules).string.min_len = 1];
}

message AddUserAddressRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];

  LocationInfo country  = 2 [(validate.rules).message.required = true];
  LocationInfo province = 3 [(validate.rules).message.required = true];
  LocationInfo district = 4 [(validate.rules).message.required = true];
  LocationInfo ward     = 5 [(validate.rules).message.required = true];

  string address_line  = 6 [(validate.rules).string.min_len = 1];
  string receiver_name = 7 [(validate.rules).string.min_len = 1];
  string phone_number  = 8 [(validate.rules).string = {pattern: "^[0-9]{10,11}$"}];

  string label      = 9 [(validate.rules).string = {in: ["Home", "Office"]}];
  bool   is_default = 10;
}

message AddUserAddressResponse {
  string address_id = 1;
}

message ProfileDetail {
  string full_name = 1;
  string gender    = 2;
}

message AddressDetail {
  string address_id    = 1;
  string receiver_name = 2;
  string phone_number  = 3;
  string province_id   = 4;
  string province_name = 5;
  string ward_id       = 6;
  string ward_name     = 7;
  string address_line  = 8;
  string label         = 9;
  bool   is_default    = 10;
}

message UserDetail {
  string                 id        = 1;
  string                 email     = 2;
  string                 status    = 3;
  repeated string        roles     = 4;
  ProfileDetail          profile   = 5;
  repeated AddressDetail addresses = 6;
}

message GetUserDetailRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
}

message GetUserDetailResponse {
  UserDetail user = 1;
}

message GetUserProfileRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
}

message GetUserProfileResponse {
  ProfileDetail profile = 1;
}

message ListUserAddressesRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
}

message ListUserAddressesResponse {
  repeated AddressDetail addresses = 1;
}

message SearchUsersRequest {
  string keyword    = 1;
  string status     = 2;
  int32  page_size  = 3;
  string page_token = 4;
}

message SearchUsersResponse {
  repeated UserDetail users           = 1;
  int64               total           = 2;
  string              next_page_token = 3;
}

message GetUserAddressByIDRequest {
  string user_id         = 1;
  string user_address_id = 2;
}

message GetUserAddressByIDResponse {
  AddressDetail address = 1;
}