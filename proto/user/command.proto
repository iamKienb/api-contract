syntax = "proto3";
package user.v1;

import "user/type.proto";

option go_package = "github.com/iamKienb/api-contract/gen/user";

service UserCommandService {
  //  Public Commands
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
  rpc AddUserAddress(AddUserAddressRequest) returns (AddUserAddressResponse);

  //  internal services
  rpc GetUserAddressByID(GetUserAddressByIDRequest)  returns (GetUserAddressByIDRequest);
}
