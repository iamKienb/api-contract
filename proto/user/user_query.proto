syntax = "proto3";
package user.v1;

import "user/user_type.proto";

option go_package = "github.com/iamKienb/shopify-go-api/gen/user";

service UserQueryService {
  rpc GetUserDetail(GetUserDetailRequest) returns (GetUserDetailResponse);
  rpc ListUserAddresses(ListUserAddressesRequest) returns (ListUserAddressesResponse);
}