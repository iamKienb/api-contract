syntax = "proto3";
package product.v1;

import "product/type.proto";

option go_package = "github.com/iamKienb/api-contract/gen/product";

service ProductCommandService {
  //  Public Commands
  rpc CreateProduct(CreateProductsRequest) returns(CreateProductsResponse);

  // internal service call
  rpc GetPriceSkusByIDs(GetPriceSkusByIDsRequest) returns (GetPriceSkusByIDsResponse);
}
