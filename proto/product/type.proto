syntax = "proto3";

package product.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/iamKienb/api-contract/gen/product";

message ProductAttributeOption {
  string          name   = 1;
  repeated string values = 2;
}

message ProductVariantOption {
  string          sku_code              = 1 [(validate.rules).string.pattern = "^[A-Z0-9_-]{3,50}$"];
  int64           price                 = 2 [(validate.rules).int64.gt = 0];
  string          currency              = 3 [(validate.rules).string.len = 3];
  string          image_url             = 4;
  repeated string attribute_value_names = 5;
  int32           quantity              = 6 [(validate.rules).int32.gte = 0];
}

message CreateProductsRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
  string name    = 2 [(validate.rules).string.min_len = 1];

  string slug = 3 [(validate.rules).string.pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"];

  string                          description = 4;
  string                          brand       = 5;
  string                          thumb_url   = 6;
  string                          video_url   = 7;
  bool                            has_variant = 8;
  repeated ProductAttributeOption attributes  = 9;
  repeated ProductVariantOption   variants    = 10 [(validate.rules).repeated.min_items = 1];
  string                          action      = 11;
}

message CreateProductsResponse {
  string workflow_id = 1;
}

message ProductVariantDetail {
  string sku_id     = 1;
  string product_id = 2;
  string shop_id    = 3;
  string sku_code   = 4;

  string product_name = 5;
  int64  price        = 6;
  string image_url    = 7;
}

message ProductCategoryView {
  string category_id = 1;
  string name        = 2;
  string slug        = 3;
}

message ProductDetail {
  string                        product_id  = 1;
  string                        shop_id     = 2;
  string                        name        = 3;
  string                        slug        = 4;
  string                        description = 5;
  string                        brand       = 6;
  string                        thumb_url   = 7;
  string                        video_url   = 8;
  int64                         price_min   = 9;
  int64                         price_max   = 10;
  string                        status      = 11;
  bool                          has_variant = 12;
  repeated ProductVariantDetail variants    = 13;
  repeated ProductCategoryView  categories  = 14;
}

message GetProductDetailRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
}

message GetProductDetailResponse {
  ProductDetail product = 1;
}

message SearchProductsRequest {
  string shop_id    = 1;
  string keyword    = 2;
  string status     = 3;
  int32  page_size  = 4;
  string page_token = 5;
}

message SearchProductsResponse {
  repeated ProductDetail products        = 1;
  int64                  total           = 2;
  string                 next_page_token = 3;
}

message ListProductVariantsRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
}

message ListProductVariantsResponse {
  repeated ProductVariantDetail variants = 1;
}

message ListProductCategoriesRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
}

message ListProductCategoriesResponse {
  repeated ProductCategoryView categories = 1;
}

message SkuCheckoutDetail {
  string sku_id       = 1;
  string product_id   = 2;
  string shop_id      = 3;
  string sku_code     = 4;
  string product_name = 5;
  int64  price        = 6;
  string image_url    = 7;
  string status       = 8;
}

message GetProductsBySkuIDsRequest {
  string          shop_id = 1;
  repeated string sku_ids = 2;

}

message GetProductsBySkuIDsResponse {
  repeated SkuCheckoutDetail items = 1;
}

message SkuPriceItem {
  string sku_id = 1;
  int64  price  = 2;
}

message GetPriceSkusByIDsRequest {
  string          shop_id = 1;
  repeated string sku_ids = 2;
}

message GetPriceSkusByIDsResponse {
  repeated SkuPriceItem skus = 1;
}