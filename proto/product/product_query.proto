syntax = "proto3";
package product.v1;

import "product/product_type.proto";

option go_package = "github.com/iamKienb/api-contract/gen/product";

service ProductQueryService {
  rpc GetProductDetail(GetProductDetailRequest) returns (GetProductDetailResponse);
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);
  rpc ListProductVariants(ListProductVariantsRequest) returns (ListProductVariantsResponse);
  rpc ListProductCategories(ListProductCategoriesRequest) returns (ListProductCategoriesResponse);
}
