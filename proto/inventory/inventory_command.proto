syntax = "proto3";
package inventory.v1;

import "inventory/inventory_type.proto";

option go_package = "github.com/iamKienb/api-contract/gen/inventory";

service InventoryCommandService {
  //  Public Commands
  rpc CreateInventories(CreateInventoriesRequest) returns (CreateInventoriesResponse);
  rpc DeleteInventory(DeleteInventoryRequest) returns (DeleteInventoryResponse);
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);
  rpc AdjustStock(AdjustStockRequest) returns (AdjustStockResponse);
}
