syntax = "proto3";

package inventory.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/iamKienb/api-contract/gen/inventory";

message InventoryItem {
  string sku_id   = 1 [(validate.rules).string.min_len = 1];
  int32  quantity = 3 [(validate.rules).int32.gte = 0];
}

message CreateInventoriesRequest {
  string                 shop_id = 1 [(validate.rules).string.min_len = 1];
  string                 user_id = 2;
  repeated InventoryItem items   = 3 [(validate.rules).repeated.min_items = 1];
}

message CreateInventoriesResponse {
  bool success = 1;
}

message DeleteInventoryRequest {
  repeated string sku_ids = 1;
}

message DeleteInventoryResponse {
  bool success = 1;
}

message StockReservationItem {
  string sku_id       = 1 [(validate.rules).string.min_len = 1];
  string inventory_id = 2 [(validate.rules).string.min_len = 1];

  int32 quantity = 3 [(validate.rules).int32.gt = 0];
}

message ReserveStockRequest {
  string shop_id  = 1 [(validate.rules).string.min_len = 1];
  string actor_id = 2;

  string order_id = 3 [(validate.rules).string.min_len = 1];

  repeated StockReservationItem items = 4 [(validate.rules).repeated.min_items = 1];
}

message ReserveStockResponse {
  google.protobuf.Timestamp expires_at = 1;
}

message ReleaseStockRequest {
  string shop_id  = 1 [(validate.rules).string.min_len = 1];
  string actor_id = 2;

  string order_id = 3[(validate.rules).string.min_len = 1];
}

message ReleaseStockResponse {
  bool success = 1;
}

message FulfillStockRequest {
  string shop_id  = 1 [(validate.rules).string.min_len = 1];
  string actor_id = 2;

  string order_id = 3[(validate.rules).string.min_len = 1];
}

message FulfillStockResponse {
  bool success = 1;
}

message InventoryStockView {
  string inventory_id = 1;
  string sku_id       = 2;
  string shop_id      = 3;
  int64  quantity     = 4;
  int64  reserved     = 5;
  int64  available    = 6;
  string status       = 7;
  string updated_at   = 8;
}

message StockMovementView {
  string id             = 1;
  string inventory_id   = 2;
  string sku_id         = 3;
  string shop_id        = 4;
  string type           = 5;
  int64  quantity       = 6;
  int64  balance_before = 7;
  int64  balance_after  = 8;
  string reference_type = 9;
  string reference_id   = 10;
  string created_at     = 11;
}

message GetInventoryItemRequest {
  string sku_id = 1 [(validate.rules).string.min_len = 1];
}

message GetInventoryItemResponse {
  InventoryStockView item = 1;
}

message ListInventoryItemsRequest {
  string shop_id    = 1 [(validate.rules).string.min_len = 1];
  int32  page_size  = 2;
  string page_token = 3;
}

message ListInventoryItemsResponse {
  repeated InventoryStockView items           = 1;
  int64                       total           = 2;
  string                      next_page_token = 3;
}

message ListLowStockItemsRequest {
  string shop_id    = 1 [(validate.rules).string.min_len = 1];
  int64  threshold  = 2;
  int32  page_size  = 3;
  string page_token = 4;
}

message ListLowStockItemsResponse {
  repeated InventoryStockView items           = 1;
  int64                       total           = 2;
  string                      next_page_token = 3;
}

message ListStockMovementsRequest {
  string sku_id     = 1 [(validate.rules).string.min_len = 1];
  int32  page_size  = 2;
  string page_token = 3;
}

message ListStockMovementsResponse {
  repeated StockMovementView items           = 1;
  int64                      total           = 2;
  string                     next_page_token = 3;
}

message SkuStock {
  int64  available_quantity = 1;
  string sku_id             = 2;
  string inventory_id       = 3;
}

message GetStockBySkuIDsRequest {
  string          shop_id = 1;
  repeated string sku_ids = 2;
}

message GetStockBySkuIDsResponse {
  repeated SkuStock sku_stock = 1;
}
