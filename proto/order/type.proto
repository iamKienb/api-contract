syntax = "proto3";

package order.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/iamKienb/api-contract/gen/order";

message PreviewCheckoutRequest {
  string                buyer_id   = 1;
  string                address_id = 2;
  string                shop_id    = 3; // Ép buộc truyền ShopID lên để đảm bảo tính đơn shop
  repeated CheckoutItem items      = 4;
}

message CheckoutItem {
  string sku_id   = 1;
  int32  quantity = 2;
}

message PreviewCheckoutResponse {
  string shop_id            = 1;
  int64  total_item_price   = 2;    // Tổng tiền hàng gốc của shop này
  int64  total_shipping_fee = 3;  // Phí vận chuyển của shop này
  int64  grand_total        = 4;         // Tiền khách phải trả (total_item_price + total_shipping_fee)

  repeated PreviewItemDetails items = 5; // Danh sách sản phẩm mua trong shop này
}

message PreviewItemDetails {
  string sku_id       = 1;
  string name         = 2;
  string thumb_url    = 3;
  int64  price        = 4;
  int32  quantity     = 5;
  bool   is_available = 6;         // Cờ báo còn hàng/hết hàng trong kho để hiển thị cảnh báo
}