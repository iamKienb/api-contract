syntax = "proto3";

package order.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/iamKienb/api-contract/gen/order";

message PreviewCheckoutRequest {
  string                buyer_id        = 1;
  string                address_user_id = 2;
  string                shop_id         = 3;
  repeated CheckoutItem items           = 4;
}

message CheckoutItem {
  string sku_id   = 1;
  int32  quantity = 2;
}

message PreviewCheckoutResponse {
  string shop_id            = 1;
  int64  total_item_price   = 2;
  int64  total_shipping_fee = 3;
  int64  grand_total        = 4;

  repeated PreviewItemDetails items = 5;
}

message PreviewItemDetails {
  string sku_id       = 1;
  string inventory_id = 2;
  string name         = 3;
  string thumb_url    = 4;
  int64  price        = 5;
  int32  quantity     = 6;
}

message PlaceOrderItem {
  string sku_id     = 1;
  int32  quantity   = 2;
  int64  base_price = 3;
}

message PlaceOrderRequest {
  string                  buyer_id        = 1;
  string                  address_user_id = 2;
  string                  shop_id         = 3;
  repeated PlaceOrderItem items           = 4;
}

message PlaceOrderResponse {
  bool success = 1;
}

message CancelOrderRequest {
  string order_id = 1; // ID của đơn hàng muốn hủy
  string actor_id = 2; // ID của người bấm nút hủy (Có thể là BuyerID hoặc AdminID)
  string reason   = 3; // Lý do hủy đơn (để lưu log phục vụ CSKH/Data Analyst)
}

message CancelOrderResponse {
  string order_id = 1;
  string status   = 2; // Trạng thái mới (ví dụ: "CANCELLED")
  string message  = 3; // Câu thông báo thành công
}

// ----------------------------------------------------
// 2. API XÁC NHẬN ĐƠN HÀNG (CONFIRM ORDER)
// ----------------------------------------------------
message ConfirmOrderRequest {
  string order_id = 1; // ID của đơn hàng cần duyệt
  string shop_id  = 2; // ID của Shop thực hiện duyệt (Để phân quyền, bảo mật dữ liệu)
  string actor_id = 3; // ID của Nhân viên/Chủ shop bấm nút duyệt đơn
}

message OrderItemView {
  string inventory_id  = 1;
  string sku_id        = 2;
  string sku_code      = 3;
  string product_id    = 4;
  string product_name  = 5;
  int64  quantity      = 6;
  int64  base_price    = 7;
  int64  item_subtotal = 8;
}

message OrderView {
  string order_id     = 1;
  string shop_id      = 2;
  string buyer_id     = 3;
  string status       = 4;
  int64  grand_total  = 5;
  string currency     = 6;
  string reason       = 7;
  string created_at   = 8;
  string confirmed_at = 9;
  string cancelled_at = 10;

  repeated OrderItemView items = 11;
}

message GetOrderDetailRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
}

message GetOrderDetailResponse {
  OrderView order = 1;
}

message ListBuyerOrdersRequest {
  string buyer_id   = 1 [(validate.rules).string.min_len = 1];
  string status     = 2;
  int32  page_size  = 3;
  string page_token = 4;
}

message ListBuyerOrdersResponse {
  repeated OrderView orders          = 1;
  int64              total           = 2;
  string             next_page_token = 3;
}

message ListShopOrdersRequest {
  string shop_id    = 1 [(validate.rules).string.min_len = 1];
  string status     = 2;
  int32  page_size  = 3;
  string page_token = 4;
}

message ListShopOrdersResponse {
  repeated OrderView orders          = 1;
  int64              total           = 2;
  string             next_page_token = 3;
}

message SearchOrdersRequest {
  string shop_id    = 1;
  string buyer_id   = 2;
  string status     = 3;
  string keyword    = 4;
  int32  page_size  = 5;
  string page_token = 6;
}

message SearchOrdersResponse {
  repeated OrderView orders          = 1;
  int64              total           = 2;
  string             next_page_token = 3;
}

message ConfirmOrderResponse {
  string order_id = 1;
  string status   = 2; // Trạng thái mới (ví dụ: "PROCESSING" hoặc "CONFIRMED")
}
