syntax = "proto3";

package shop.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/iamKienb/api-contract/gen/shop";

message ShopProfileInfo {
  optional string description = 1;
  optional string logo_url    = 2;
  optional string banner_url  = 3;
}

message CreateShopRequest {
  string name = 2 [(validate.rules).string.min_len = 1];
  string slug = 3 [(validate.rules).string = {
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$",
    min_len: 1,
    max_len: 20
  }];
  optional ShopProfileInfo profile = 4;
}

message CreateShopResponse {
  string shop_id = 1;
}

message LocationInfo {
  int64  id   = 1 [(validate.rules).int64.gt = 0];
  string name = 2 [(validate.rules).string.min_len = 1];
}

message AddShopAddressRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
  string shop_id = 2 [(validate.rules).string.min_len = 1];

  LocationInfo country  = 3 [(validate.rules).message.required = true];
  LocationInfo city     = 4 [(validate.rules).message.required = true];
  LocationInfo district = 5 [(validate.rules).message.required = true];
  LocationInfo ward     = 6 [(validate.rules).message.required = true];

  string address_line = 7 [(validate.rules).string.min_len = 1];
  string contact_name = 8 [(validate.rules).string.min_len = 1];
  string phone_number = 9 [(validate.rules).string = {pattern: "^[0-9]{10,11}$"}];

  string type = 10 [(validate.rules).string = {in: ["Pickup", "Return"]}];
}

message AddShopAddressResponse {
  string address_id = 1;
}

message RoleID {
  int32 id = 1;
}

message Member  {
  string          id      = 1 [(validate.rules).string.min_len = 1];
  string          name    = 2 [(validate.rules).string.min_len = 1];
  repeated RoleID roleIDs = 3  [(validate.rules).repeated.min_items = 1];
}

message AssignMemberRolesRequest  {
  string          shop_id      = 1;
  repeated Member member_roles = 2 [(validate.rules).repeated.min_items = 1];
  string          action       = 3[(validate.rules).string.min_len = 1];
}

message AssignMemberRolesResponse {
  bool success = 1;
}

message IsAuthorizedRequest {
  string shop_id = 1;
  string user_id = 2;
  string action  = 3;
}

message IsAuthorizedResponse {
  bool   allowed = 1;
  string message = 2;
}
