syntax = "proto3";
package shop.v1;

import "shop/shop_type.proto";

option go_package = "github.com/iamKienb/shopify-go-api/gen/shop";

service ShopCommandService {
  //  Public Commands
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc AddAddress(AddAddressRequest) returns (AddAddressResponse);
  rpc AssignMemberRoles(AssignMemberRolesRequest) returns (AssignMemberRolesResponse);
}
