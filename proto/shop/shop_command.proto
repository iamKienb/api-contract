syntax = "proto3";
package shop.v1;

import "shop/shop_type.proto";

option go_package = "github.com/iamKienb/shopify-go-api/gen/shop";

service ShopCommandService {
  //  Public Commands
  rpc CreateShop(CreateShopRequest) returns (CreateShopResponse);
  rpc AddShopAddress(AddShopAddressRequest) returns (AddShopAddressResponse);
  rpc AssignShopMemberRoles(AssignShopMemberRolesRequest) returns (AssignShopMemberRolesResponse);
}
