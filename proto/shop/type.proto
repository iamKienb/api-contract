syntax = "proto3";

package shop.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/iamKienb/api-contract/gen/shop";

message ShopProfileInfo {
  optional string description = 1;
  optional string logo_url    = 2;
  optional string banner_url  = 3;
}

message CreateShopRequest {
  string name = 2 [(validate.rules).string.min_len = 1];
  string slug = 3 [(validate.rules).string = {
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$",
    min_len: 1,
    max_len: 20
  }];
  optional ShopProfileInfo profile = 4;
}

message CreateShopResponse {
  string shop_id = 1;
}

message LocationInfo {
  int64  id   = 1 [(validate.rules).int64.gt = 0];
  string name = 2 [(validate.rules).string.min_len = 1];
}

message AddShopAddressRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
  string shop_id = 2 [(validate.rules).string.min_len = 1];

  LocationInfo country  = 3 [(validate.rules).message.required = true];
  LocationInfo province = 4 [(validate.rules).message.required = true];
  LocationInfo ward     = 5 [(validate.rules).message.required = true];

  string address_line = 6 [(validate.rules).string.min_len = 1];
  string contact_name = 7 [(validate.rules).string.min_len = 1];
  string phone_number = 8 [(validate.rules).string = {pattern: "^[0-9]{10,11}$"}];

  string type = 9 [(validate.rules).string = {in: ["PICKUP", "RETURN"]}];
}

message AddShopAddressResponse {
  string address_id = 1;
}

message RoleID {
  int32 id = 1;
}

message Member  {
  string          id      = 1 [(validate.rules).string.min_len = 1];
  string          name    = 2 [(validate.rules).string.min_len = 1];
  repeated RoleID roleIDs = 3  [(validate.rules).repeated.min_items = 1];
}

message AssignMemberRolesRequest  {
  string          shop_id      = 1;
  repeated Member member_roles = 2 [(validate.rules).repeated.min_items = 1];
  string          action       = 3[(validate.rules).string.min_len = 1];
}

message AssignMemberRolesResponse {
  bool success = 1;
}

message CheckPermissionRequest {
  string shop_id = 1;
  string user_id = 2;
  string action  = 3;
}

message CheckPermissionResponse {
  bool   is_allowed = 1;
  string message    = 2;
}

message ShopProfileDetail {
  string description = 1;
  string logo_url    = 2;
  string banner_url  = 3;
}

message ShopAddressDetail {
  string id            = 1;
  string shop_id       = 2;
  int32  province_id   = 3;
  string province_name = 4;
  int32  ward_id       = 5;
  string ward_name     = 6;
  string address_line  = 8;
  string full_address  = 7;
  string contact_name  = 9;
  string phone_number  = 10;
  string type          = 11;
}

message Role {
  string id   = 1;
  string code = 2;
  string name = 3;

}

message ShopMemberDetail {
  string         id       = 1;
  string         name     = 2;
  repeated int32 role_ids = 3;
  repeated Role  roles    = 4;
}

message ShopDetail {
  string                     shop_id   = 1;
  string                     name      = 2;
  string                     slug      = 3;
  string                     status    = 4;
  ShopProfileDetail          profile   = 5;
  repeated ShopAddressDetail addresses = 6;
  repeated ShopMemberDetail  members   = 7;
}

message GetShopDetailRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message GetShopDetailResponse {
  ShopDetail shop = 1;
}

message SearchShopsRequest {
  string keyword    = 1;
  string status     = 2;
  int32  page_size  = 3;
  string page_token = 4;
}

message SearchShopsResponse {
  repeated ShopDetail shops           = 1;
  int64               total           = 2;
  string              next_page_token = 3;
}

message ListShopAddressesRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message ListShopAddressesResponse {
  repeated ShopAddressDetail addresses = 1;
}

message ListShopMembersRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message ListShopMembersResponse {
  repeated ShopMemberDetail members = 1;
}
