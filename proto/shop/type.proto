syntax = "proto3";

package shop.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/iamKienb/api-contract/gen/shop";

message ShopProfileInfo {
  optional string description = 1;
  optional string logo_url    = 2;
  optional string banner_url  = 3;
}

message CreateShopRequest {
  string name = 2 [(validate.rules).string.min_len = 1];
  string slug = 3 [(validate.rules).string = {
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$",
    min_len: 1,
    max_len: 20
  }];
  optional ShopProfileInfo profile = 4;
}

message CreateShopResponse {
  string shop_id = 1;
}

message LocationInfo {
  int64  id   = 1 [(validate.rules).int64.gt = 0];
  string name = 2 [(validate.rules).string.min_len = 1];
}

message AddShopAddressRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
  string shop_id = 2 [(validate.rules).string.min_len = 1];

  LocationInfo country  = 3 [(validate.rules).message.required = true];
  LocationInfo city     = 4 [(validate.rules).message.required = true];
  LocationInfo district = 5 [(validate.rules).message.required = true];
  LocationInfo ward     = 6 [(validate.rules).message.required = true];

  string address_line = 7 [(validate.rules).string.min_len = 1];
  string contact_name = 8 [(validate.rules).string.min_len = 1];
  string phone_number = 9 [(validate.rules).string = {pattern: "^[0-9]{10,11}$"}];

  string type = 10 [(validate.rules).string = {in: ["Pickup", "Return"]}];
}

message AddShopAddressResponse {
  string address_id = 1;
}

message RoleID {
  int32 id = 1;
}

message Member  {
  string          id      = 1 [(validate.rules).string.min_len = 1];
  string          name    = 2 [(validate.rules).string.min_len = 1];
  repeated RoleID roleIDs = 3  [(validate.rules).repeated.min_items = 1];
}

message AssignMemberRolesRequest  {
  string          shop_id      = 1;
  repeated Member member_roles = 2 [(validate.rules).repeated.min_items = 1];
  string          action       = 3[(validate.rules).string.min_len = 1];
}

message AssignMemberRolesResponse {
  bool success = 1;
}

message CheckPermissionRequest {
  string shop_id = 1;
  string user_id = 2;
  string action  = 3;
}

message CheckPermissionResponse {
  bool   is_allowed = 1;
  string message    = 2;
}

message ShopProfileView {
  string description = 1;
  string logo_url    = 2;
  string banner_url  = 3;
  google.protobuf.Struct extra = 4;
}

message ShopAddressView {
  string id           = 1;
  string shop_id      = 2;
  string full_address = 3;
  string address_line = 4;
  string contact_name = 5;
  string phone_number = 6;
  string type         = 7;
  google.protobuf.Struct extra = 8;
}

message ShopMemberView {
  string id = 1;
  string name = 2;
  repeated int32 role_ids = 3;
  google.protobuf.Struct extra = 4;
}

message ShopView {
  string shop_id = 1;
  string name    = 2;
  string slug    = 3;
  string status  = 4;
  ShopProfileView profile = 5;
  repeated ShopAddressView addresses = 6;
  repeated ShopMemberView members = 7;
  google.protobuf.Struct extra = 8;
}

message GetShopDetailRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message GetShopDetailResponse {
  ShopView shop = 1;
}

message SearchShopsRequest {
  string keyword = 1;
  string status = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message SearchShopsResponse {
  repeated ShopView shops = 1;
  int64 total = 2;
  string next_page_token = 3;
}

message ListShopAddressesRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message ListShopAddressesResponse {
  repeated ShopAddressView addresses = 1;
}

message ListShopMembersRequest {
  string shop_id = 1 [(validate.rules).string.min_len = 1];
}

message ListShopMembersResponse {
  repeated ShopMemberView members = 1;
}
