syntax = "proto3";
package shop.v1;

import "shop/shop_type.proto";

option go_package = "github.com/iamKienb/api-contract-module/gen/shop";

service ShopQueryService {
  rpc SearchShops(SearchShopsRequest) returns (SearchShopsResponse);
  rpc GetShopDetail(GetShopDetailRequest) returns (GetShopDetailResponse);
  rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
}